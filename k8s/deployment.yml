apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cicd
  labels:
    app: nginx-cicd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-cicd
  template:
    metadata:
      labels:
        app: nginx-cicd
    spec:
      containers:
      - name: nginx
        image: shauyeb009/nginx-cicd-demo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
